[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20", "npm-10_x", "nginx"]

[phases.install]
cmds = [
  "mkdir -p /var/log/nginx /var/cache/nginx",
  "composer install --ignore-platform-reqs --no-interaction --optimize-autoloader --no-scripts",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
